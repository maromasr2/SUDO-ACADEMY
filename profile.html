<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Information | Sudo Academy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <nav>
        <div class="logo-container" onclick="window.location.href='index.html'" style="cursor:pointer;">
            <span class="logo">Sudo Academy</span>
        </div>
        <a href="index.html" style="color:white; text-decoration:none;">العودة للهوم ←</a>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 50px;">
        <div class="admin-card">
            <h2 style="color:var(--primary); font-family:'Orbitron'; text-align:center;">ACCOUNT INFO</h2>
            <div class="input-group">
                <label>الاسم الكامل:</label>
                <input type="text" id="updateName" placeholder="اسمك الثلاثي">
            </div>
            <div class="input-group">
                <label>السن:</label>
                <input type="number" id="updateAge" placeholder="عمرك">
            </div>
            <div class="input-group">
                <label>رقم الواتساب:</label>
                <input type="text" id="updatePhone" placeholder="بمفتاح الدولة (مثال: 20155...)">
            </div>
            <button onclick="updateProfile()" class="btn-main" style="width:100%; margin-top:20px;">تحديث البيانات ✅</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
