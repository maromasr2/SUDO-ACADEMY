<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>هوية المحارب | Sudo Academy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body style="background:var(--bg); color:white; padding:20px;">
    <nav style="display:flex; justify-content:space-between; margin-bottom:40px;">
        <span class="neon-text-small">SUDO PROFILE</span>
        <a href="index.html" class="btn-main" style="text-decoration:none;">🏠 الهوم</a>
    </nav>
    <div class="admin-card" style="max-width:500px; margin:auto; border:1px solid var(--primary);">
        <label>الإيميل (محمي):</label>
        <input type="text" id="prof-email" disabled style="background:#000; color:#555; width:100%; padding:10px; margin-bottom:20px; border:1px solid #222;">
        <label>الاسم الثلاثي:</label>
        <input type="text" id="prof-name" style="width:100%; padding:10px; margin-bottom:20px; background:#0b0e11; color:white; border:1px solid #333;">
        <label>رقم الواتساب:</label>
        <input type="text" id="prof-phone" placeholder="أدخل رقمك مع رمز الدولة" style="width:100%; padding:10px; margin-bottom:10px; background:#0b0e11; color:white; border:1px solid #333;">
        <p id="phone-note" style="font-size:11px; color:#666; margin-bottom:20px;">* سيتم قفل الرقم للأبد بعد الحفظ الأول.</p>
        <button onclick="saveProfile()" class="btn-main full-w">حفظ الهوية 🛡️</button>
    </div>
    <script src="config.js"></script>
    <script>
        firebase.auth().onAuthStateChanged(async user => {
            if(!user) window.location.href = 'index.html';
            document.getElementById('prof-email').value = user.email;
            const doc = await db.collection("users_profiles").doc(user.email).get();
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('prof-name').value = d.name || user.displayName || "";
                if(d.phone) {
                    const ph = document.getElementById('prof-phone');
                    ph.value = d.phone; ph.disabled = true; ph.style.background = "#000";
                    document.getElementById('phone-note').innerText = "✅ هذا الرقم موثق جنائياً.";
                }
            }
        });
        async function saveProfile() {
            const user = firebase.auth().currentUser;
            const name = document.getElementById('prof-name').value;
            const phoneField = document.getElementById('prof-phone');
            if(!name) return alert("الاسم مطلوب!");
            await user.updateProfile({ displayName: name });
            let data = { name, email: user.email, updatedAt: new Date() };
            if(!phoneField.disabled && phoneField.value) data.phone = phoneField.value;
            await db.collection("users_profiles").doc(user.email).set(data, { merge: true });
            alert("✅ تم الحفظ!"); location.reload();
        }
    </script>
</body>
</html>
