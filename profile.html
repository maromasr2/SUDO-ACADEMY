<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Profile | Sudo Academy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container" style="max-width:500px; margin-top:50px;">
        <div class="admin-card">
            <h2 class="neon-text-small">البيانات الشخصية</h2>
            
            <label>البريد الإلكتروني (محمي):</label>
            <input type="text" id="userEmail" disabled style="background:#222; color:#888;">

            <label>الاسم الكامل:</label>
            <input type="text" id="updateName">

            <label>رقم الهاتف (لا يمكن تغييره بعد الحفظ):</label>
            <input type="text" id="updatePhone" placeholder="أدخل رقمك مع رمز الدولة">
            
            <button onclick="saveProfile()" class="btn-main full-w" style="margin-top:20px;">حفظ التعديلات</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        firebase.auth().onAuthStateChanged(async user => {
            if(!user) window.location.href = 'index.html';
            document.getElementById('userEmail').value = user.email;
            
            const doc = await db.collection("users_profiles").doc(user.email).get();
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('updateName').value = data.name || "";
                document.getElementById('updatePhone').value = data.phone || "";
                if(data.phone) document.getElementById('updatePhone').disabled = true;
            }
        });

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            const phoneField = document.getElementById('updatePhone');
            const data = {
                name: document.getElementById('updateName').value,
                email: user.email,
                updatedAt: new Date()
            };
            
            if(!phoneField.disabled) {
                data.phone = phoneField.value;
            }

            await db.collection("users_profiles").doc(user.email).set(data, { merge: true });
            alert("تم حفظ البيانات بنجاح 🛡️");
            location.reload();
        }
    </script>
</body>
</html>
