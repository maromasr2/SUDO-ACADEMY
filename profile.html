<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي | Sudo Academy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body style="background:var(--bg); color:white; padding:20px;">
    <nav style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.5); padding:15px; border-radius:10px; margin-bottom:30px;">
        <span style="font-family:'Orbitron'; color:var(--primary); font-weight:bold;">SUDO PROFILE</span>
        <a href="index.html" class="btn-main" style="text-decoration:none; background:#222; padding:8px 15px;">🏠 العودة للرئيسية</a>
    </nav>

    <div class="admin-card" style="max-width:500px; margin:auto; border:1px solid var(--primary);">
        <h2 style="text-align:center; font-family:'Orbitron'; color:var(--primary);">SOLDIER IDENTITY</h2>
        <label style="color:#888;">البريد الإلكتروني (محمي):</label>
        <input type="text" id="prof-email" disabled style="background:#000; color:#555; width:100%; padding:12px; border-radius:8px; border:1px solid #222; margin-bottom:20px;">

        <label>الاسم الثلاثي:</label>
        <input type="text" id="prof-name" placeholder="اسمك الحقيقي" style="width:100%; padding:12px; border-radius:8px; background:#0b0e11; color:white; border:1px solid #333; margin-bottom:20px;">

        <label>رقم الواتساب:</label>
        <input type="text" id="prof-phone" placeholder="مثال: 201012345678" style="width:100%; padding:12px; border-radius:8px; background:#0b0e11; color:white; border:1px solid #333; margin-bottom:10px;">
        <p id="phone-note" style="font-size:11px; color:#666; margin-bottom:25px;">* سيتم قفل الرقم للأبد بعد أول حفظ.</p>

        <button onclick="saveProfile()" class="btn-main full-w" style="padding:15px; font-size:1.1rem;">حفظ الهوية وتحديث الموقع 🛡️</button>
    </div>

    <script src="config.js"></script>
    <script>
        firebase.auth().onAuthStateChanged(async user => {
            if(!user) { window.location.href = 'index.html'; return; }
            document.getElementById('prof-email').value = user.email;
            const doc = await db.collection("users_profiles").doc(user.email).get();
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('prof-name').value = d.name || user.displayName || "";
                if(d.phone) {
                    const ph = document.getElementById('prof-phone');
                    ph.value = d.phone; ph.disabled = true; ph.style.background = "#000";
                    document.getElementById('phone-note').innerText = "✅ الرقم موثق ولا يمكن تغييره.";
                }
            }
        });

        async function saveProfile() {
            const user = firebase.auth().currentUser;
            const name = document.getElementById('prof-name').value.trim();
            const phoneField = document.getElementById('prof-phone');
            if(!name) return alert("الاسم مطلوب!");

            await user.updateProfile({ displayName: name });
            let data = { name, email: user.email, updatedAt: new Date() };
            if(!phoneField.disabled && phoneField.value) data.phone = phoneField.value.trim();
            
            await db.collection("users_profiles").doc(user.email).set(data, { merge: true });
            alert("✅ تم التحديث بنجاح!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
