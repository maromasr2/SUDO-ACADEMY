<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudo Academy | Marwan Swedan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <nav>
        <div class="logo-container">
            <span class="logo">Sudo Academy</span>
            <span class="owner-tag">By: Marwan Swedan</span>
        </div>
        <div id="auth-section">
            <button id="loginBtn" class="btn-main" onclick="loginWithGoogle()">تسجيل دخول بجوجل</button>
            <span id="userDisplayName"></span>
            <a href="admin.html" id="adminLink" style="display:none; color:var(--primary); margin-right:15px; text-decoration:none; font-weight:bold;">لوحة التحكم</a>
        </div>
    </nav>

    <header class="hero" data-aos="zoom-in">
        <h1 class="neon-text">MARWAN SWEDAN</h1>
        <p>مرحباً بك في أكاديمية Sudo لعلوم التحقيق الجنائي الرقمي والسيبراني 🛡️</p>
    </header>

    <div class="container">
        <h2 data-aos="fade-left">الكورسات المتاحة</h2>
        <div id="courses-grid" class="grid">
            </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
</body>
</html>
