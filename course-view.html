<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قاعة المحاضرات | Sudo Academy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body style="background:var(--bg); color:white;">
    <nav style="padding:15px; display:flex; justify-content:space-between; background:#000;">
        <a href="index.html" style="color:var(--primary); text-decoration:none;">← عودة</a>
        <span id="course-title-display"></span>
    </nav>
    <div class="admin-grid" style="grid-template-columns: 3fr 1fr; padding:20px; gap:20px;">
        <div class="admin-card">
            <div id="player"></div>
            <div style="height:5px; background:#222; margin-top:15px; border-radius:3px;">
                <div id="progress-fill" style="height:100%; background:var(--primary); width:0%;"></div>
            </div>
            <p id="v-title" style="margin-top:15px; font-weight:bold;"></p>
        </div>
        <div class="admin-card">
            <h3>📂 قائمة الدروس</h3>
            <div id="video-list"></div>
        </div>
    </div>
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        let player, currentVidIndex, vids = [];
        let userEmail;

        firebase.auth().onAuthStateChanged(user => {
            if(!user) window.location.href = 'index.html';
            userEmail = user.email;
            loadCourse();
        });

        async function loadCourse() {
            const doc = await db.collection("courses").doc(courseId).get();
            const data = doc.data(); vids = data.videos;
            document.getElementById('course-title-display').innerText = data.title;
            renderList(); playVid(0);
        }

        async function renderList() {
            const list = document.getElementById('video-list'); list.innerHTML = "";
            for(let i=0; i<vids.length; i++) {
                const prog = await db.collection("user_progress").doc(`${userEmail}_${courseId}_${i}`).get();
                const done = prog.exists && prog.data().done;
                list.innerHTML += `<div class="video-item ${done?'done':''}" onclick="playVid(${i})">${done?'✅':'🎥'} ${vids[i].title}</div>`;
            }
        }

        function playVid(index) {
            currentVidIndex = index;
            const vId = vids[index].url.split('/').pop();
            if(player) player.loadVideoById(vId);
            else {
                player = new YT.Player('player', {
                    height: '450', width: '100%', videoId: vId,
                    events: { 'onStateChange': onPlayerStateChange }
                });
            }
            document.getElementById('v-title').innerText = vids[index].title;
            setInterval(updateProgress, 1000);
        }

        function updateProgress() {
            if(player && player.getDuration) {
                const p = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('progress-fill').style.width = p + "%";
                if(p >= 80) markAsDone();
            }
        }

        async function markAsDone() {
            await db.collection("user_progress").doc(`${userEmail}_${courseId}_${currentVidIndex}`).set({ done: true }, { merge: true });
            renderList();
        }
        function onPlayerStateChange(event) {}
    </script>
</body>
</html>
