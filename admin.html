<section class="admin-card full-width">
    <h3>📊 إحصائيات جيش سودو</h3>
    <p>إجمالي المسجلين: <span id="total-users-count" style="color:var(--primary); font-weight:bold;">0</span></p>
    
    <table style="width:100%; border-collapse: collapse; margin-top:20px;">
        <thead>
            <tr style="border-bottom:1px solid var(--primary);">
                <th>الاسم</th>
                <th>الإيميل</th>
                <th>التواصل</th>
            </tr>
        </thead>
        <tbody id="users-list-table"></tbody>
    </table>
</section>

<script>
    // تحديث الإحصائيات (توضع داخل سكريبت admin.js أو admin.html)
    async function loadStats() {
        const snapshot = await db.collection("users_profiles").get();
        document.getElementById('total-users-count').innerText = snapshot.size;
        
        const table = document.getElementById('users-list-table');
        table.innerHTML = "";
        snapshot.forEach(doc => {
            const user = doc.data();
            const waLink = user.phone ? `https://wa.me/${user.phone.replace('+', '')}` : "#";
            table.innerHTML += `
                <tr style="border-bottom:1px solid #333;">
                    <td>${user.name || 'غير معروف'}</td>
                    <td>${user.email}</td>
                    <td><a href="${waLink}" target="_blank" class="btn-main" style="padding:5px 10px; font-size:12px; background:#25d366;">WhatsApp</a></td>
                </tr>`;
        });
    }
    loadStats();
</script>
